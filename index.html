<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bixxville · Relation Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0E1311; --surface:#16201C; --surface2:#1D2924;
    --ink:#EDEFEA; --ink-dim:#9DAaa3; --ink-faint:#67726C;
    --leaf:#7FD49A; --leaf-deep:#3E8A5C; --gold:#E0A85A;
    --line:rgba(237,239,234,.10); --line2:rgba(237,239,234,.18);
    --alert:#E0735A;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(127,212,154,.08), transparent);}
  .wrap{max-width:680px;margin:0 auto;padding:24px 20px 80px}

  /* ── login ── */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-box{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:40px 32px;text-align:center}
  .mark{font-family:'Fraunces',serif;font-size:34px;font-weight:600;letter-spacing:-.02em}
  .mark span{color:var(--leaf)}
  .gate-sub{color:var(--ink-dim);font-size:13px;margin:8px 0 28px;line-height:1.5}
  .field{text-align:left;margin-bottom:16px}
  .field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:7px;font-weight:500}
  input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;
    padding:13px 14px;color:var(--ink);font-family:inherit;font-size:14px;transition:border-color .15s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--leaf)}
  textarea{resize:vertical;min-height:80px;line-height:1.5}
  .btn{background:var(--leaf);color:#08110C;border:none;border-radius:9px;padding:13px 20px;font-family:inherit;
    font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:transform .1s,background .15s}
  .btn:hover{background:#94deab}
  .btn:active{transform:scale(.99)}
  .btn-ghost{background:transparent;border:1px solid var(--line2);color:var(--ink)}
  .btn-ghost:hover{background:var(--surface2);border-color:var(--leaf)}
  .err{color:var(--alert);font-size:12px;margin-top:12px;min-height:16px}

  /* ── header ── */
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .top .mark{font-size:22px}
  .who{text-align:right}
  .who-name{font-weight:600;font-size:14px}
  .who-role{font-size:11px;color:var(--ink-faint)}
  .signout{font-size:11px;color:var(--ink-dim);cursor:pointer;text-decoration:underline;margin-top:3px}

  /* ── tabs ── */
  .tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--surface);padding:5px;border-radius:11px;border:1px solid var(--line)}
  .tab{flex:1;text-align:center;padding:10px;border-radius:7px;font-size:13px;font-weight:500;color:var(--ink-dim);cursor:pointer;transition:all .15s}
  .tab.on{background:var(--surface2);color:var(--ink)}

  /* ── cards / sections ── */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-bottom:16px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--leaf);font-weight:600;margin-bottom:10px}
  h2{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin-bottom:6px;letter-spacing:-.01em}
  .lead{color:var(--ink-dim);font-size:13px;line-height:1.6;margin-bottom:18px}

  /* ── capacity blocks ── */
  .cap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:14px}
  .cap-cell{aspect-ratio:1;border-radius:6px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-faint)}
  .cap-cell.open{background:rgba(127,212,154,.12);border-color:var(--leaf-deep);color:var(--leaf)}
  .cap-cell.taken{background:rgba(224,115,90,.08);border-color:rgba(224,115,90,.3);color:var(--alert)}
  .cap-legend{display:flex;gap:18px;margin-top:14px;font-size:11px;color:var(--ink-dim)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}

  /* ── deliverables builder ── */
  .deliv-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
  .deliv-row input{flex:1}
  .deliv-check{margin-top:11px;font-size:11px;white-space:nowrap}
  .deliv-add{background:transparent;border:1px dashed var(--line2);color:var(--leaf);padding:10px;border-radius:8px;cursor:pointer;font-size:12px;width:100%;font-family:inherit}
  .binary-flag{font-size:11px;color:var(--gold);margin-top:5px;display:flex;align-items:center;gap:5px}
  .binary-ok{color:var(--leaf)}

  /* ── wallet ── */
  .wallet-box{background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:16px;margin:16px 0}
  .wallet-row{display:flex;justify-content:space-between;align-items:center}
  .balance{font-family:'Fraunces',serif;font-size:24px;font-weight:600}
  .confirmed{color:var(--leaf);font-size:12px;display:flex;align-items:center;gap:6px;margin-top:8px}

  /* ── status pills ── */
  .pill{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:600}
  .pill.pending{background:rgba(224,168,90,.14);color:var(--gold)}
  .pill.approved{background:rgba(127,212,154,.14);color:var(--leaf)}
  .pill.declined{background:rgba(224,115,90,.14);color:var(--alert)}

  /* ── messages ── */
  .msg-scroll{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0 14px}
  .bubble{max-width:78%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.4}
  .bubble.me{align-self:flex-end;background:var(--leaf);color:#08110C;border-bottom-right-radius:4px}
  .bubble.them{align-self:flex-start;background:var(--surface2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble .b-who{font-size:9px;opacity:.6;margin-bottom:2px}
  .compose{display:flex;gap:8px;margin-top:8px}
  .compose input{flex:1}
  .compose .btn{width:auto;padding:13px 22px}

  .empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:30px}
  .sub-item{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:15px;margin-bottom:10px}
  .sub-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .sub-title{font-weight:600;font-size:14px}
  .sub-meta{font-size:11px;color:var(--ink-faint);margin-top:3px}
  .hint{font-size:11px;color:var(--ink-faint);margin-top:6px;line-height:1.5}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--leaf);
    color:var(--ink);padding:12px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="mark">BIXX<span>VILLE</span></div>
    <div class="gate-sub">Relation Portal — bring your work to the network. Enter the access code your operator gave you.</div>
    <div class="field">
      <label>Access code</label>
      <input id="access-code" type="text" placeholder="Your code" autocomplete="off"/>
    </div>
    <button class="btn" onclick="enterPortal()">Enter portal</button>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="wrap" id="app" style="display:none">
  <div class="top">
    <div class="mark">BIXX<span>VILLE</span></div>
    <div class="who">
      <div class="who-name" id="rel-name">—</div>
      <div class="who-role">Relation</div>
      <div class="signout" onclick="signOut()">Sign out</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" id="tab-submit" onclick="showTab('submit')">Submit work</div>
    <div class="tab" id="tab-capacity" onclick="showTab('capacity')">Availability</div>
    <div class="tab" id="tab-status" onclick="showTab('status')">My work</div>
    <div class="tab" id="tab-messages" onclick="showTab('messages')">Messages</div>
  </div>

  <div id="panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://deotcopartijomfveakr.supabase.co';
const SB_KEY = 'sb_publishable_yi4AJEt5MLMafDBgTgXnBg_1gvB4gtz';
let sb = null;
let relation = null;       // { code, name }
let deliverables = [];     // [{text, binary}]
let walletAddr = null, walletUSDC = null, walletConfirmed = false;
let activeTab = 'submit';
let mySubs = [];
let msgs = [];
let msgKey = null;

const MSG_SALT = new TextEncoder().encode('bixxville-node-msg-v1');

function initSB(){ if(!sb && window.supabase) sb = window.supabase.createClient(SB_URL, SB_KEY); return sb; }
function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2600); }

// ── LOGIN ──
async function enterPortal(){
  const code = document.getElementById('access-code').value.trim();
  const err = document.getElementById('gate-err');
  if(!code){ err.textContent='Enter your access code.'; return; }
  if(!initSB()){ err.textContent='Connection unavailable. Try again.'; return; }
  try{
    const { data, error } = await sb.from('relation_access').select('*').eq('code',code).eq('active',true).maybeSingle();
    if(error) throw error;
    if(!data){ err.textContent='That code wasn\u2019t recognized. Check with your operator.'; return; }
    relation = { code: data.code, name: data.relation_name };
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('rel-name').textContent = relation.name;
    showTab('submit');
  }catch(e){ console.error(e); err.textContent='Something went wrong. Try again.'; }
}
function signOut(){ relation=null; location.reload(); }

// ── TABS ──
function showTab(t){
  activeTab = t;
  ['submit','capacity','status','messages'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on', x===t);
  });
  if(t==='submit') renderSubmit();
  if(t==='capacity') renderCapacity();
  if(t==='status') renderStatus();
  if(t==='messages') renderMessages();
}

// ── SUBMIT WORK ──
function renderSubmit(){
  if(deliverables.length===0) deliverables=[{text:'',binary:false}];
  document.getElementById('panel').innerHTML = `
  <div class="card">
    <div class="eyebrow">New request</div>
    <h2>Tell us what you need done</h2>
    <p class="lead">Describe the work, then break it into clear deliverables. Each one should be something we can mark <b>done or not done</b> — no grey areas. That\u2019s how we both know exactly what success looks like.</p>

    <div class="field"><label>Title</label><input id="s-title" placeholder="e.g. Prepare rental unit at 905 NE 5th for lease"/></div>
    <div class="field"><label>Overview</label><textarea id="s-scope" placeholder="A short description of the work and the outcome you want."></textarea></div>

    <div class="field">
      <label>Deliverables — what must be true when this is done</label>
      <div id="deliv-list"></div>
      <button class="deliv-add" onclick="addDeliv()">+ Add a deliverable</button>
      <div class="hint">Good: \u201CRoof replaced and inspected.\u201D \u2014 Not clear: \u201CImprove the roof.\u201D We\u2019ll flag anything that isn\u2019t a clean done-or-not.</div>
    </div>

    <div class="field"><label>Rough size estimate (hours of work, if you know it)</label><input id="s-logs" type="number" min="1" placeholder="Optional"/></div>

    ${renderWalletBox()}

    <button class="btn" onclick="submitWork()" style="margin-top:8px">Submit to operators for review</button>
    <div class="hint" style="text-align:center;margin-top:10px">Your operators review every request before it enters the network. You\u2019ll see its status under \u201CMy work.\u201D</div>
  </div>`;
  renderDelivList();
}

function renderDelivList(){
  const FUZZY = /\b(improve|enhance|optimize|better|handle|manage|support|help with|work on|nice|good|clean up|fix up)\b/i;
  document.getElementById('deliv-list').innerHTML = deliverables.map((d,i)=>{
    const flagged = d.text.trim() && FUZZY.test(d.text);
    const ok = d.text.trim() && !flagged;
    return `<div>
      <div class="deliv-row">
        <input value="${d.text.replace(/"/g,'&quot;')}" placeholder="Deliverable ${i+1}" oninput="updateDeliv(${i},this.value)"/>
        ${deliverables.length>1?`<button class="btn-ghost" style="width:auto;padding:11px 13px" onclick="removeDeliv(${i})">\u00d7</button>`:''}
      </div>
      ${flagged?`<div class="binary-flag">\u26A0 This sounds open-ended. Can you state it as a clear done-or-not? e.g. a specific result.</div>`:''}
      ${ok?`<div class="binary-flag binary-ok">\u2713 Clear deliverable</div>`:''}
    </div>`;
  }).join('');
}
function addDeliv(){ deliverables.push({text:'',binary:false}); renderDelivList(); }
function removeDeliv(i){ deliverables.splice(i,1); renderDelivList(); }
function updateDeliv(i,v){ deliverables[i].text=v; renderDelivList(); }

// ── WALLET (read-only confirm) ──
function renderWalletBox(){
  if(!walletConfirmed){
    return `<div class="wallet-box">
      <div class="wallet-row">
        <div><div style="font-size:13px;font-weight:600">Confirm you can fund this</div>
        <div style="font-size:11px;color:var(--ink-dim);margin-top:3px">Connect your wallet so we can confirm funds are available. We only read your balance — nothing moves.</div></div>
      </div>
      <button class="btn-ghost" style="margin-top:12px" onclick="connectWallet()">Connect wallet</button>
    </div>`;
  }
  return `<div class="wallet-box">
    <div class="wallet-row">
      <div><div style="font-size:11px;color:var(--ink-dim)">USDC available</div><div class="balance">${walletUSDC!=null?walletUSDC.toLocaleString(undefined,{maximumFractionDigits:2}):'\u2014'}</div></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--ink-faint)">${walletAddr.slice(0,6)}\u2026${walletAddr.slice(-4)}</div></div>
    </div>
    <div class="confirmed">\u2713 Wallet connected \u00b7 funds visible to operators</div>
  </div>`;
}
async function connectWallet(){
  if(!window.ethereum){ toast('No wallet found. Open this page in your wallet\u2019s browser, or install MetaMask.'); return; }
  try{
    const accts = await window.ethereum.request({method:'eth_requestAccounts'});
    walletAddr = accts[0];
    // switch to Base so the balance reads on the right network
    try { await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x2105'}]}); }
    catch(se){ if(se.code===4902){ try{ await window.ethereum.request({method:'wallet_addEthereumChain',params:[{chainId:'0x2105',chainName:'Base',nativeCurrency:{name:'Ether',symbol:'ETH',decimals:18},rpcUrls:['https://mainnet.base.org'],blockExplorerUrls:['https://basescan.org']}]}); }catch(ae){} } }
    const data = '0x70a08231000000000000000000000000'+walletAddr.slice(2);
    const res = await window.ethereum.request({method:'eth_call',params:[{to:'0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913',data},'latest']});
    walletUSDC = (res && res!=='0x') ? parseInt(res,16)/1e6 : 0;
    walletConfirmed = true;
    toast('Wallet connected on Base');
    renderSubmit();
  }catch(e){ console.error(e); toast('Connection cancelled'); }
}

async function submitWork(){
  const title = document.getElementById('s-title').value.trim();
  const scope = document.getElementById('s-scope').value.trim();
  const logs = parseFloat(document.getElementById('s-logs').value)||null;
  const cleanDelivs = deliverables.filter(d=>d.text.trim());
  if(!title){ toast('Give your request a title.'); return; }
  if(cleanDelivs.length===0){ toast('Add at least one deliverable.'); return; }
  if(!initSB()){ toast('Connection unavailable.'); return; }
  try{
    const { error } = await sb.from('relation_submissions').insert({
      relation_name: relation.name, relation_code: relation.code,
      title, scope, deliverables: cleanDelivs.map(d=>({text:d.text})),
      log_estimate: logs, wallet_addr: walletAddr,
      wallet_confirmed: walletConfirmed, funded_amount: walletUSDC,
      status: 'pending'
    });
    if(error) throw error;
    toast('Submitted — your operators will review it');
    deliverables=[{text:'',binary:false}]; walletConfirmed=false; walletAddr=null; walletUSDC=null;
    showTab('status');
  }catch(e){ console.error(e); toast('Could not submit. Try again.'); }
}

// ── CAPACITY ──
async function renderCapacity(){
  document.getElementById('panel').innerHTML = `<div class="card">
    <div class="eyebrow">This cycle</div><h2>Availability</h2>
    <p class="lead">The network works in 28-day cycles of four-hour blocks. Green blocks have room for new work; amber blocks are already committed. Submit early in the cycle for the best chance of a fast start.</p>
    <div id="cap-body"><div class="empty">Loading availability\u2026</div></div>
  </div>`;
  if(!initSB()) return;
  try{
    const { data } = await sb.from('bids').select('log_size,status,day_slot').neq('status','settled');
    const committed = (data||[]).reduce((s,b)=>s+Math.ceil(Number(b.log_size||0)/4),0);
    const TOTAL = 42; // show a 6x7 grid as a friendly capacity sense
    let html = '<div class="cap-grid">';
    for(let i=0;i<TOTAL;i++){
      const taken = i < committed;
      html += `<div class="cap-cell ${taken?'taken':'open'}">${taken?'':'\u00b7'}</div>`;
    }
    html += '</div><div class="cap-legend"><span><span class="dot" style="background:var(--leaf-deep)"></span>Open</span><span><span class="dot" style="background:rgba(224,115,90,.4)"></span>Committed</span></div>';
    html += `<p class="hint" style="margin-top:16px">${TOTAL-committed} of ${TOTAL} blocks open this cycle.</p>`;
    document.getElementById('cap-body').innerHTML = html;
  }catch(e){ document.getElementById('cap-body').innerHTML='<div class="empty">Couldn\u2019t load availability.</div>'; }
}

// ── MY WORK / STATUS ──
async function renderStatus(){
  document.getElementById('panel').innerHTML = `<div class="card">
    <div class="eyebrow">Your requests</div><h2>My work</h2>
    <div id="status-body"><div class="empty">Loading\u2026</div></div>
  </div>`;
  if(!initSB()) return;
  try{
    const { data } = await sb.from('relation_submissions').select('*').eq('relation_code',relation.code).order('created_at',{ascending:false});
    mySubs = data||[];
    if(!mySubs.length){ document.getElementById('status-body').innerHTML='<div class="empty">No requests yet. Submit your first under \u201CSubmit work.\u201D</div>'; return; }
    document.getElementById('status-body').innerHTML = mySubs.map(s=>{
      const st = s.status||'pending';
      return `<div class="sub-item">
        <div class="sub-head">
          <div><div class="sub-title">${s.title}</div>
          <div class="sub-meta">${(s.deliverables||[]).length} deliverable(s)${s.log_estimate?' \u00b7 ~'+s.log_estimate+'h':''} \u00b7 ${new Date(s.created_at).toLocaleDateString()}</div></div>
          <span class="pill ${st}">${st}</span>
        </div>
        ${s.scope?`<div class="hint" style="margin-top:8px">${s.scope}</div>`:''}
      </div>`;
    }).join('');
  }catch(e){ document.getElementById('status-body').innerHTML='<div class="empty">Couldn\u2019t load your work.</div>'; }
}

// ── MESSAGES ──
async function renderMessages(){
  document.getElementById('panel').innerHTML = `<div class="card">
    <div class="eyebrow">Talk to your operators</div><h2>Messages</h2>
    <p class="lead">Reach the operators directly. They see your messages in their workspace.</p>
    <div class="field"><label>Shared message password</label>
      <input id="m-pw" type="password" placeholder="The password your operator gave you" onkeydown="if(event.key==='Enter')unlockMsgs()"/>
      <button class="btn" style="margin-top:10px" onclick="unlockMsgs()" id="m-unlock-btn">Unlock messages</button>
    </div>
    <div id="msg-area" style="display:none">
      <div class="msg-scroll" id="msg-scroll"></div>
      <div class="compose"><input id="m-input" placeholder="Write a message\u2026" onkeydown="if(event.key==='Enter')sendMsg()"/><button class="btn" onclick="sendMsg()">Send</button></div>
    </div>
  </div>`;
  if(msgKey){ document.getElementById('m-pw').parentElement.style.display='none'; document.getElementById('msg-area').style.display='block'; await loadMsgs(); }
}

async function deriveKey(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:MSG_SALT,iterations:100000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptMsg(text,key){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(text));
  const buf=new Uint8Array(iv.length+ct.byteLength); buf.set(iv,0); buf.set(new Uint8Array(ct),iv.length);
  return btoa(String.fromCharCode(...buf));
}
async function decryptMsg(b64,key){
  try{ const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0)); const iv=raw.slice(0,12),data=raw.slice(12);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data); return new TextDecoder().decode(pt);
  }catch(e){ return '\uD83D\uDD12'; }
}
async function unlockMsgs(){
  const pw=document.getElementById('m-pw').value; if(!pw){ toast('Enter the password'); return; }
  msgKey=await deriveKey(pw);
  document.getElementById('m-pw').parentElement.style.display='none';
  document.getElementById('msg-area').style.display='block';
  await loadMsgs();
  subscribeMsgs();
}
async function loadMsgs(){
  if(!initSB()||!msgKey) return;
  try{
    // relation messages use recipient/sender = relation name <-> 'OPERATORS'
    const { data } = await sb.from('direct_messages').select('*')
      .or(`and(sender.eq.${relation.name},recipient.eq.OPERATORS),and(sender.eq.OPERATORS,recipient.eq.${relation.name})`)
      .order('created_at',{ascending:true});
    msgs=[]; for(const r of (data||[])) msgs.push({sender:r.sender,text:await decryptMsg(r.ciphertext,msgKey),ts:r.created_at});
    const el=document.getElementById('msg-scroll');
    el.innerHTML = msgs.length? msgs.map(m=>{
      const me=m.sender===relation.name;
      return `<div class="bubble ${me?'me':'them'}"><div class="b-who">${me?'You':'Operators'}</div>${m.text.replace(/</g,'&lt;')}</div>`;
    }).join('') : '<div class="empty">No messages yet. Say hello.</div>';
    el.scrollTop=el.scrollHeight;
  }catch(e){ console.error(e); }
}
async function sendMsg(){
  const inp=document.getElementById('m-input'); const text=inp.value.trim();
  if(!text||!msgKey) return;
  try{
    const ct=await encryptMsg(text,msgKey);
    await sb.from('direct_messages').insert({sender:relation.name,recipient:'OPERATORS',ciphertext:ct});
    inp.value=''; await loadMsgs();
  }catch(e){ toast('Could not send'); }
}
function subscribeMsgs(){
  if(!sb) return;
  sb.channel('rel_msgs').on('postgres_changes',{event:'INSERT',schema:'public',table:'direct_messages'},async()=>{ if(activeTab==='messages') await loadMsgs(); }).subscribe();
}
</script>
